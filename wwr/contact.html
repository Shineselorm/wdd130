<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Volta River Adventures</title>
    <meta name="description"
      content="Contact Volta River Adventures for reservations, trip questions, and general inquiries. Visit us near the Adomi Bridge in Ghana's Volta Region.">
    <meta name="author" content="Shine Selorm Sedziafa">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img class="logo" src="images/logo.png" alt="Volta River Adventures Logo">
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html" aria-current="page">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="contact-info">
            <h1>Volta River Adventures</h1>
            <p>Akosombo Road, Adomi Bridge Area<br>Volta Region, Ghana</p>
            <p>Phone: <a href="tel:+233245550198">+233 24 555 0198</a></p>
            <p>Email: <a href="mailto:info@voltariveradventures.com">info@voltariveradventures.com</a></p>
        </section>
        <section class="map-form">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3972.4567890123!2d-0.0497!3d6.2736!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x103b93c2b7ffb30b%3A0x8fbcb485c6e66f1!2sAkosombo%2C%20Ghana!5e0!3m2!1sen!2sgh!4v1717700000000!5m2!1sen!2sgh"
                  width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"
                  title="Volta River Adventures location map"></iframe>
            </div>
            <form class="contact-form" action="#" method="post">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <fieldset>
                    <legend>Message Purpose</legend>
                    <label>
                        <input type="radio" name="purpose" value="general" checked>
                        General Inquiry
                    </label>
                    <label>
                        <input type="radio" name="purpose" value="reservation">
                        Reservation Question
                    </label>
                    <label>
                        <input type="radio" name="purpose" value="website">
                        Website Suggestion
                    </label>
                </fieldset>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <label class="checkbox-label">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Get in Touch!</button>
            </form>
        </section>
        <section class="employees">
            <h2>We Are Here to Serve You</h2>
            <div class="employee-gallery">
                <figure>
                    <img src="images/employee1.jpg" alt="Kofi Mensah, Lead River Guide">
                    <figcaption>Kofi Mensah<br>Lead River Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/employee2.jpg" alt="Ama Boateng, Safety Coordinator">
                    <figcaption>Ama Boateng<br>Safety Coordinator</figcaption>
                </figure>
                <figure>
                    <img src="images/employee3.jpg" alt="Kwame Asante, Guest Relations Manager">
                    <figcaption>Kwame Asante<br>Guest Relations Manager</figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>©2026 Volta River Adventures Shine Selorm Sedziafa</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
